fail_fast: false
default_language_version:
  python: python3
default_stages:
  - pre-commit
  - pre-push
minimum_pre_commit_version: 2.16.0
repos:
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.12
    hooks:
      - id: biome-format
        # inconsistent indentation with cruft - file never to be modified manually.
        exclude: ^\.cruft\.json$
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.1
    hooks:
      - id: pyproject-fmt
        # pyproject-fmt applies PEP 503 name-normalization to `project.name`, which
        # corrupts the raw Jinja token here (`.` -> `-`) since it isn't Jinja-aware.
        # The rendered pyproject.toml in a generated project is unaffected (its own
        # .pre-commit-config.yaml runs this hook on real, already-rendered content).
        exclude: '^\{\{ cookiecutter\.project_name \}\}/pyproject\.toml$'
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        types_or: [python, pyi, jupyter]
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        types_or: [python, pyi, jupyter]
  - repo: https://github.com/mwouts/jupytext
    rev: v1.14.5
    hooks:
      - id: jupytext
        args: [--from, ipynb, --sync, --pipe, "ruff format -", --pipe-fmt, "py:percent"]
        additional_dependencies:
            - ruff==0.15.11 # Matches hook
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-ast
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
      - id: check-case-conflict
        # Check that there are no merge conflicts (could be generated by template sync)
      - id: check-merge-conflict
        args: [--assume-in-merge]
  - repo: https://github.com/lorenzwalthert/precommit
    rev: v0.4.3.9026
    hooks:
      - id: style-files
      - id: lintr
        additional_dependencies:
            - reticulate # scripts/r/_io.R calls into Python via reticulate::import()
      - id: parsable-R
      - id: no-debug-statement
      - id: no-print-statement
      - id: no-browser-statement
  - repo: local
    hooks:
      - id: forbid-to-commit
        name: Don't commit rej files
        entry: |
          Cannot commit .rej files. These indicate merge conflicts that arise during automated template updates.
          Fix the merge conflicts manually and remove the .rej files.
        language: fail
        files: '.*\.rej$'
      - id: sync-readme-to-index
        name: "Sync {{ cookiecutter.project_name }}/README.md -> notebooks/index.md (3-way merge on conflict)"
        entry: bash -c 'cd "{{ cookiecutter.project_name }}" && ./.sync_readme_to_index.sh'
        language: system
        files: '^\{\{ cookiecutter\.project_name \}\}/(README\.md|notebooks/index\.md)$'
        pass_filenames: false
      - id: check-import-calls
        name: Check _import(...) bootstrap calls are internally consistent
        entry: python3 hooks/_check_import_calls.py
        language: system
        types_or: [python, jupyter]
      - id: sync-precommit-config
        name: "Sync non-local pre-commit hooks from {{ cookiecutter.project_name }}/.pre-commit-config.yaml"
        entry: python3 hooks/_sync_precommit_configs.py
        language: system
        files: '^(\.pre-commit-config\.yaml|\{\{ cookiecutter\.project_name \}\}/\.pre-commit-config\.yaml)$'
        pass_filenames: false
