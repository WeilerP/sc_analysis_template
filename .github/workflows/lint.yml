name: Lint

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Setup Python 3.14
      uses: actions/setup-python@v6
      with:
          python-version: "3.14"

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: "4.5.3"
        use-public-rspm: true

    - name: Run pre-commit hooks
      uses: pre-commit/action@v3.0.1
